<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>
  <style>
    .title{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:24px;font-weight:bold;fill:#111}
    .text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:17px;fill:#111}
    .small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:14px;fill:#333}
    .path{stroke:#1976d2;stroke-width:5;fill:none}
    .robot{fill:#fff;stroke:#333;stroke-width:3}
    .err{stroke:#d32f2f;stroke-width:3;stroke-dasharray:7 5;fill:none}
    .heading{stroke:#333;stroke-width:3;marker-end:url(#arrow2)}
    .goal{fill:#4caf50;stroke:#1b5e20;stroke-width:2}
  </style>

  <text x="45" y="42" class="title">路径跟踪中的常见误差</text>
  <text x="45" y="72" class="small">控制器需要根据机器人当前位置和路径之间的误差生成速度指令。</text>

  <path d="M80,390 C190,310 250,250 380,250 C520,250 610,160 750,160 C835,160 890,210 925,260" class="path"/>
  <text x="815" y="145" class="text" fill="#1976d2">规划路径</text>

  <circle cx="415" cy="340" r="32" class="robot"/>
  <path d="M415,340 L485,312" class="heading"/>
  <text x="360" y="395" class="text">机器人当前位置</text>

  <circle cx="393" cy="250" r="8" fill="#1976d2"/>
  <path d="M415,340 L393,250" class="err"/>
  <text x="230" y="320" class="text" fill="#d32f2f">横向误差</text>

  <path d="M393,250 L465,250" stroke="#1976d2" stroke-width="3" marker-end="url(#arrow2)"/>
  <text x="475" y="255" class="small">路径方向</text>
  <path d="M415,340 A80,80 0 0,1 470,302" stroke="#ff9800" stroke-width="3" fill="none"/>
  <text x="500" y="315" class="text" fill="#ef6c00">航向误差</text>

  <circle cx="870" cy="215" r="13" class="goal"/>
  <text x="840" y="250" class="text">目标点</text>
</svg>
